<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="image/mobile-nav-logo.png" sizes="96x96" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Timnha | Good house for renting</title>

    <link rel="stylesheet" href="homepage.css">
    <script src="https://kit.fontawesome.com/fd36773b43.js" crossorigin="anonymous"></script>
</head>
<body>
    <!--Sticky menu start-->

        <div class="mobile-sticky-menu-container">
            <div class="mobile-sticky-menu-search">
                <div class="search-icon-container1">
                    <i class="fa-solid fa-magnifying-glass fa-sm"></i>
                </div>
                <p class="mobile-search-p">Start searching</p>
            </div>
        </div>

    <!--Sticky menu end-->
    <header>
        <div class="container">
            <nav class="main-nav">
                <div class="logo">
                    <img class="nav-logo" src="image/nav-logo.png"> 
                    <img class="mobile-nav-logo" src="image/mobile-nav-logo.png">
                </div>
                <div class="header-search-bar" role="search" aria-label="Search destinations">
                    <div class="header-search-item">
                        <p class="header-search-label">Địa điểm</p>
                        <p class="header-search-subtext">Tìm điểm đến</p>
                    </div>
                    <div class="header-search-divider"></div>
                    <div class="header-search-item">
                        <p class="header-search-label">Giá</p>
                        <input class="header-search-subtext header-search-number-input" type="number" min="0" step="1" placeholder="Chọn giá" aria-label="Chọn giá">
                    </div>
                    <div class="header-search-divider"></div>
                    <div class="header-search-item">
                        <p class="header-search-label">Khách</p>
                        <p class="header-search-subtext">Thêm khách</p>
                    </div>
                    <button class="header-search-button" type="button" aria-label="Search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                <ul class="nav-menu-links">
                    <li class="nav-icon-container hamburger-btn">
                        <a href="" class="nav-link">
                            <i style="color: black" class="fa-solid fa-bars"></i>
                        </a>
                    </li>
                </ul>
                
            </nav>
        </div>
    </header>

    <!--Mobile Menu fixed-->
    <div class="container">
        <div class="mobile-menu-fixed">
            <div class="mobile-menu-container">
                <ul class="mobile-menu">
                    <li class="mobile-menu-li menu-flexbox">
                        <a class="mobile-menu-link">
                            <i class="fa-solid fa-question fa-xs"></i>
                        </a>
                        <a href="" class="mobile-menu-link">Trung tâm trợ giúp</a>
                    </li>
                    <li class="divider"></li>
                    <li class="mobile-menu-li">
                        <a href="" class="mobile-menu-link">Đăng nhập hoặc đăng kí</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Menu start-->
    
        <div class="mobile-footer-container">
            <ul class="mobile-footer">
                <li class="mobile-li">
                    <a href="" class="footer-icon">
                        <i class="fa-solid fa-magnifying-glass fa-lg"></i>
                    </a>
                    <a href="" class="footer-menu-link">Khám phá</a>
                </li>
                <li class="mobile-li">
                    <a href="" class="footer-icon">
                        <i class="fa-solid fa-user fa-lg" style="color: rgb(252, 158, 116);"></i>
                    </a>
                    <a href="" class="footer-menu-link">Đăng Nhập</a>
                </li>
            </ul>
        </div>
    
    <!-- Mobile Bottom Menu end-->

    <main>
        <div class="container">
            <section class="destination">
                <div class="destination-list" id="destination-list"></div>
            </section>
        </div>
    </main>

    <!--Footer start-->

    <footer class="footer-container">
            <div class="footer-column">
                <h3 class="footer-title">Nhóm 12</h3>
                <ul>
                    <li class="footer-li"><a href="#">Bùi Thanh Thảo</a></li>
                    <li class="footer-li"><a href="#">Nguyễn Tuấn Anh</a></li>
                    <li class="footer-li"><a href="#">Nguyễn Ngô Minh Đức</a></li>
                    <li class="footer-li"><a href="#">Tống Nhật Linh</a></li>
                </ul>
            </div>
    </footer>

    <!--Footer end-->

    <script src="homepage.js"></script>
</body>
</html>
