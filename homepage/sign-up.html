<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Auth</title>
    <link rel="stylesheet" href="sign-up.css">
</head>

<body>

    <div class="modal-overlay">
        <div class="auth-card">
            <div class="close-btn">&times;</div>

            <div class="auth-header">
                <h2 id="form-title">Đăng nhập</h2>
                <p id="form-subtitle">Chào mừng bạn quay trở lại!</p>
            </div>

            <form id="auth-form">
                <div class="input-group signup-only" style="display: none;">
                    <input type="text" placeholder="Họ và tên">
                </div>
                <div class="input-group signup-only" style="display: none;">
                    <input type="tel" placeholder="Số điện thoại">
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Mật khẩu" required>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">Tiếp tục</button>
            </form>

            <div class="divider">
                <span>HOẶC</span>
            </div>

            <div class="social-buttons">
                <button class="btn-outline">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18">
                    Tiếp tục với Google
                </button>
                <button class="btn-outline">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="18">
                    Tiếp tục với Facebook
                </button>
            </div>

            <div class="auth-footer">
                <span id="footer-text">Bạn chưa có tài khoản?</span>
                <a href="javascript:void(0)" id="toggle-link" onclick="toggleAuth()">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;

            // Lấy các phần tử cần thay đổi
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const signupFields = document.querySelectorAll('.signup-only');
            const submitBtn = document.getElementById('submit-btn');
            const footerText = document.getElementById('footer-text');
            const toggleLink = document.getElementById('toggle-link');

            if (isLogin) {
                title.innerText = "Đăng nhập";
                subtitle.innerText = "Chào mừng bạn quay trở lại!";
                submitBtn.innerText = "Tiếp tục";
                footerText.innerText = "Bạn chưa có tài khoản?";
                toggleLink.innerText = "Đăng ký ngay";
                signupFields.forEach(field => field.style.display = 'none');
            } else {
                title.innerText = "Đăng ký";
                subtitle.innerText = "Tạo tài khoản để trải nghiệm Airbnb.";
                submitBtn.innerText = "Đăng ký";
                footerText.innerText = "Bạn đã có tài khoản?";
                toggleLink.innerText = "Đăng nhập";
                signupFields.forEach(field => field.style.display = 'block');
            }
        }
    </script>

</body>

</html>
