<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký hiện đại</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="close-btn">&times;</div>

            <div class="auth-header">
                <h2 id="form-title">Đăng nhập</h2>
                <p id="form-subtitle">Chào mừng bạn quay trở lại!</p>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>

                <div class="input-group" id="name-group" style="display: none;">
                    <input type="text" placeholder="Họ và tên">
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Mật khẩu" required>
                </div>

                <button type="submit" class="btn-submit">Tiếp tục</button>
            </form>

            <div class="divider">
                <span>hoặc</span>
            </div>

            <div class="social-login">
                <button class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
                    Tiếp tục với Google
                </button>
                <button class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="20">
                    Tiếp tục với Facebook
                </button>
            </div>

            <div class="auth-footer">
                <p id="toggle-text">Bạn chưa có tài khoản? <a href="#" onclick="toggleForm()">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

    <script>
        // Một chút JavaScript cơ bản để chuyển đổi giao diện
        let isLogin = true;
        function toggleForm() {
            isLogin = !isLogin;
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const nameGroup = document.getElementById('name-group');
            const toggleText = document.getElementById('toggle-text');

            if (isLogin) {
                title.innerText = "Đăng nhập";
                subtitle.innerText = "Chào mừng bạn quay trở lại!";
                nameGroup.style.display = "none";
                toggleText.innerHTML = 'Bạn chưa có tài khoản? <a href="#" onclick="toggleForm()">Đăng ký ngay</a>';
            } else {
                title.innerText = "Tạo tài khoản";
                subtitle.innerText = "Tham gia cùng cộng đồng của chúng tôi.";
                nameGroup.style.display = "block";
                toggleText.innerHTML = 'Bạn đã có tài khoản? <a href="#" onclick="toggleForm()">Đăng nhập</a>';
            }
        }
    </script>

</body>

</html>
