<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Header Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header-container">
        <div class="navbar">
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Airbnb_Logo_Bélo.svg" alt="Airbnb Logo"
                    width="102">
            </div>

            <div class="nav-links">
                <div class="nav-item active">
                    <img src="https://cdn-icons-png.flaticon.com/512/619/619153.png" width="20"> <span>Nơi lưu
                        trú</span>
                </div>
                <div class="nav-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/2910/2910311.png" width="20"> <span>Trải
                        nghiệm</span>
                    <span class="badge">MỚI</span>
                </div>
                <div class="nav-item">
                    <img src="https://cdn-icons-png.flaticon.com/512/3050/3050222.png" width="20"> <span>Dịch vụ</span>
                    <span class="badge">MỚI</span>
                </div>
            </div>

            <div class="user-controls">
                <span class="host-text">Trở thành host</span>
                <div class="icon-globe">🌐</div>
                <div class="profile-menu">
                    <span>☰</span>
                    <div class="user-avatar">👤</div>
                </div>
            </div>
        </div>

        <div class="search-section">
            <div class="main-search-bar">
                <div class="search-input-group">
                    <label>Địa điểm</label>
                    <input type="text" placeholder="Tìm kiếm điểm đến">
                </div>
                <div class="divider"></div>
                <div class="search-input-group">
                    <label>Thời gian</label>
                    <input type="text" placeholder="Thêm ngày">
                </div>
                <div class="divider"></div>
                <div class="search-input-group">
                    <label>Khách</label>
                    <input type="text" placeholder="Thêm khách">
                </div>
                <button class="search-button">
                    <span class="search-icon">🔍</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section-header">
            <h2>Nơi lưu trú được ưa chuộng tại Hồ Chí Minh <span class="arrow-icon">›</span></h2>
            <div class="slider-controls">
                <button class="nav-btn">‹</button>
                <button class="nav-btn">›</button>
            </div>
        </div>

        <div class="listing-grid">
            <div class="room-card">
                <div class="image-wrapper">
                    <img src="https://a0.muscache.com/im/pictures/miso/Hosting-53274539/original/3652a70e-8ab4-4688-952c-43fe53ba9544.jpeg"
                        alt="Phòng">
                    <div class="badge-guest">Được khách yêu thích</div>
                    <button class="wishlist-btn">
                        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"
                            role="presentation" focusable="false"
                            style="display: block; fill: rgba(0, 0, 0, 0.5); height: 24px; width: 24px; stroke: white; stroke-width: 2; overflow: visible;">
                            <path
                                d="m16 28c7-4.733 14-10 14-17 0-4.418-3.582-8-8-8-2.529 0-4.756 1.176-6 3.016-1.244-1.84-3.471-3.016-6-3.016-4.418 0-8 3.582-8 8 0 7 7 12.267 14 17z">
                            </path>
                        </svg>
                    </button>
                </div>
                <div class="room-details">
                    <div class="row-1">
                        <span class="location">Phòng tại Hồ Chí Minh</span>
                        <span class="rating">★ 4,4</span>
                    </div>
                    <p class="price"><b>1.716.860 ₫</b> cho 2 đêm</p>
                </div>
            </div>

        </div>
    </div>


</body>

</html>
